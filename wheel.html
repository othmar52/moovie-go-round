<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Movie Go Round - Movie Wheel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark-theme">
    <div class="layout">
      <div class="sidebar">
        <div class="header">
          <h3 data-i18n="titleWheel">Film-Auswahl</h3>
          <button id="copyBtn" class="icon-btn" data-i18n-title="copyBtnTitle" data-i18n="copyBtn">📋 Kopieren</button>
        </div>

        <p id="status" class="status-text" data-i18n="statusSearching">Suche läuft...</p>

        <div id="movieList" class="scroll-list">
          <p class="loading" data-i18n="loadingExtracting">Filme werden aus Tabs extrahiert...</p>
        </div>

        <div class="manual-entry-area">
          <textarea id="manualInput" data-i18n="manualInputPlaceholder" placeholder="Weitere Filme hier eingeben (eine Zeile pro Film)..."></textarea>
          <button id="addManualBtn" class="secondary-btn" data-i18n="addManualBtn">Hinzufügen</button>
        </div>

        <div class="settings-area">
          <div class="slider-group">
            <label for="maxItemsSlider"><span data-i18n="maxItemsLbl">Max. Segmente: </span> <span id="maxItemsVal">30</span></label>
            <input type="range" id="maxItemsSlider" min="2" max="100" value="30"/>
          </div>
          <div class="slider-group">
            <label for="durationSlider"><span data-i18n="durationLbl">Drehzeit (Sek.): </span> <span id="durationVal">20</span></label>
            <input type="range" id="durationSlider" min="1" max="60" value="20"/>
          </div>
        </div>
      </div>

      <div class="main-area">
        <div class="wheel-layout">
          <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel" width="900" height="900"></canvas>
          </div>

          <div class="side-controls">
            <button id="spinBtn" class="spin-btn" disabled data-i18n="spinBtn">HOLD<br/>&<br/>SPIN!</button>
          </div>
        </div>
      </div>
    </div>

    <div id="winnerModal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <h1 id="modalWinnerText">Filmname</h1>
        <button id="focusTabBtn" class="primary-btn" style="display: none" data-i18n="focusTabBtn">🎬 Zum Film-Tab wechseln</button>
        <button id="copyListBtn" class="secondary-btn" data-i18n="copyListBtn">📋 Liste kopieren</button>
        <button id="closeModalBtn" class="primary-btn" data-i18n="closeModalBtn">Schließen & Neu drehen</button>
      </div>
    </div>
    <canvas id="confettiCanvas" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99999; display: none;"></canvas>
    
    <script src="i18n.js"></script>
    <script src="wheel.js"></script>
  </body>
</html>
